project:
  name: smoke_test
  output_dir: runs/smoke_test

seed: 7
device: cpu
use_amp: false
resume: null

data:
  dataset: synthetic
  data_root: null
  prepared_dir: data/prepared/smoke
  sampling_rate_hz: 64
  window_seconds_options: [30, 25, 20]
  window_sec: 30
  step_sec: 30
  synthetic_samples: 8
  batch_size: 2
  num_workers: 0
  val_fraction: 0.25
  max_windows: 8

preprocessing:
  normalize: zscore
  detrend: true
  bandpass:
    enabled: false
    low_hz: 0.5
    high_hz: 5.0
    order: 3

tinyppg:
  model_dir: ../Tiny-PPG-master
  checkpoint_path: ../Tiny-PPG-master/Save_Model/model_parameter-2023-5-31-1.pkl
  threshold: 0.5
  artifact_output_mode: artifact_probability
  artifact_class_index: 1
  require_checkpoint: true

artifact_calibration:
  thresholds: [0.3, 0.5, 0.7]
  max_windows: 4
  warn_mean_removed_above: 90.0
  warn_full_crop_above: 50.0
  warn_too_short_above: 50.0

cropper:
  mode: crop
  min_clean_samples: 8
  min_output_samples: 8
  empty_policy: keep_original
  mask_fill_value: 0.0

model:
  type: simple_cnn
  name: hr_estimator
  hidden_channels: 32
  dropout: 0.0

training:
  max_epochs: 1
  epochs: 1
  batch_size: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: huber
  huber_delta: 5.0
  num_workers: 0
  use_amp: false
  resume: null
  save_last_every_epoch: true
  hr_checkpoint_dir: runs/smoke_test/checkpoints/baseline
  framework_checkpoint_dir: runs/smoke_test/checkpoints/full_framework
  max_train_batches: 1
  max_val_batches: 1

paths:
  output_dir: runs/smoke_test
  checkpoint_dir: runs/smoke_test/checkpoints
  log_dir: runs/smoke_test/logs

